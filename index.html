<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayan TeraCloud - Ultra Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Pura Background Kalo ebong Text Sada */
        body { background: #000; color: #fff; font-family: 'Arial', sans-serif; }
        
        /* Glitch Animation boro ebong Bold */
        .glitch { font-size: 3.5rem; font-weight: 900; text-transform: uppercase; animation: glitch 0.4s infinite; text-align: center; color: #fff; }
        @keyframes glitch { 0% { transform: skew(2.2deg); text-shadow: 3px 0 #f00; } 50% { transform: skew(-2.2deg); text-shadow: -3px 0 #0ff; } 100% { transform: skew(0deg); } }
        
        /* Card design boro font shoho */
        .card { background: #111; border: 2px solid #333; padding: 25px; border-radius: 12px; transition: 0.3s; cursor: pointer; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .card:hover { border-color: #fff; box-shadow: 0 0 20px #fff; transform: translateY(-5px); }
        
        /* Input ebong Button Bold & Large */
        input, textarea { background: #1a1a1a !important; border: 2px solid #444 !important; color: #fff !important; padding: 15px; width: 100%; border-radius: 8px; margin-bottom: 12px; font-weight: bold; font-size: 1.1rem; outline: none; }
        button { background: #fff; color: #000; padding: 15px; border-radius: 8px; width: 100%; font-weight: 900; font-size: 1.2rem; cursor: pointer; border: none; transition: 0.3s; }
        button:hover { background: #ccc; box-shadow: 0 0 15px #fff; }
        
        .breadcrumb { color: #aaa; font-size: 18px; margin-bottom: 30px; font-weight: bold; cursor: pointer; }
        .breadcrumb span:hover { color: #fff; text-decoration: underline; }
        .section-title { font-size: 1.8rem; font-weight: 900; border-bottom: 3px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto">
        <div class="mb-16">
            <h1 class="glitch">Rafsan Ahmed Ayan</h1>
            <p class="text-center text-gray-400 font-bold tracking-widest mt-4">UNLIMITED CLOUD STORAGE</p>
        </div>

        <div class="breadcrumb" id="breadcrumb" onclick="goHome()">🏠 HOME</div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-16" id="contentDisplay">
            </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
            
            <div class="card text-left">
                <h3 class="section-title">📤 MULTI UPLOAD</h3>
                <p class="text-gray-400 mb-4 font-bold">You can select multiple files at once</p>
                <input type="file" id="fileInput" multiple> 
                <button onclick="uploadFiles()">UPLOAD ALL TO TELEGRAM</button>
            </div>

            <div class="card text-left">
                <h3 class="section-title">📜 KEEP NOTES</h3>
                <input type="text" id="noteTitle" placeholder="NOTE TITLE">
                <textarea id="noteContent" rows="3" placeholder="WRITE YOUR NOTE..."></textarea>
                <button onclick="saveNote()">SAVE NOTE</button>
            </div>

            <div class="card text-left md:col-span-2">
                <h3 class="section-title">➕ CREATE NEW FOLDER</h3>
                <div class="flex gap-4">
                    <input type="text" id="newFolderName" placeholder="FOLDER NAME" class="flex-grow">
                    <button onclick="addNewFolder()" style="width: 200px;">CREATE</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const BOT_TOKEN = "8619134830:AAHMs7N2255JPuelNUAXIh5JlnwuPPvfo0c";
        const CHAT_ID = "-1003713977945";

        let currentPath = ["HOME"];
        let storage = {
            "HOME": ["Rafsan Ahmed Ayan", "Family", "Relatives", "Social Media", "Friends", "Apps"]
        };

        function render() {
            const currentFolder = currentPath[currentPath.length - 1];
            document.getElementById('breadcrumb').innerHTML = "🏠 " + currentPath.join(" > ");
            
            const display = document.getElementById('contentDisplay');
            display.innerHTML = "";

            const items = storage[currentFolder] || [];
            items.forEach(item => {
                display.innerHTML += `
                    <div class="card" onclick="openFolder('${item}')">
                        <span class="block text-6xl mb-4">📁</span>
                        <span class="uppercase">${item}</span>
                    </div>`;
            });
        }

        function openFolder(name) {
            currentPath.push(name);
            if (!storage[name]) storage[name] = [];
            render();
        }

        function goHome() {
            currentPath = ["HOME"];
            render();
        }

        function addNewFolder() {
            const name = document.getElementById('newFolderName').value.toUpperCase();
            if (!name) return alert("Folder-er naam din!");
            const currentFolder = currentPath[currentPath.length - 1];
            storage[currentFolder].push(name);
            storage[name] = [];
            document.getElementById('newFolderName').value = "";
            render();
        }

        // Multiple file upload function
        async function uploadFiles() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;
            if (files.length === 0) return alert("File select korun!");
            
            const currentFolder = currentPath[currentPath.length - 1];
            alert(files.length + " ti file upload shuru hocche...");

            for (let i = 0; i < files.length; i++) {
                const formData = new FormData();
                formData.append('chat_id', CHAT_ID);
                formData.append('document', files[i]);
                formData.append('caption', `📂 PATH: ${currentPath.join("/")}\n📁 FOLDER: ${currentFolder}\n📄 FILE: ${files[i].name}`);

                try {
                    await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: formData });
                } catch (err) {
                    console.error("Upload failed for: " + files[i].name);
                }
            }
            alert("Shob file Telegram-e pathano hoyeche!");
            fileInput.value = "";
        }

        async function saveNote() {
            const title = document.getElementById('noteTitle').value.toUpperCase();
            const text = document.getElementById('noteContent').value;
            const currentFolder = currentPath[currentPath.length - 1];
            
            if(!title || !text) return alert("Title ebong Note likhun!");

            const message = `📜 *NEW NOTE SAVED*\n📍 *FOLDER:* ${currentFolder}\n📌 *TITLE:* ${title}\n📝 *CONTENT:* ${text}`;
            
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`);
            if (res.ok) alert("Note Telegram-e save hoyeche!");
            
            document.getElementById('noteTitle').value = "";
            document.getElementById('noteContent').value = "";
        }

        render();
    </script>
</body>
</html>
