<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Phone Auth</title>
</head>
<body>

    <h2>Phone Authentication</h2>
    
    <div id="auth-container">
        <input type="tel" id="phoneNumber" placeholder="+88017XXXXXXXX">
        <button id="sendCode">Send OTP</button>
    </div>

    <div id="otp-container" style="display:none;">
        <input type="text" id="verificationCode" placeholder="Enter OTP">
        <button id="verifyCode">Verify OTP</button>
    </div>

    <div id="recaptcha-container"></div>

    <script type="module">
        // Firebase SDK ইমপোর্ট করা
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, RecaptchaVerifier, signInWithPhoneNumber } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // আপনার স্ক্রিনশট থেকে নেওয়া কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyAboeMS-WDLs7fe12jmL9t6YgX8XMKQbeQ",
            authDomain: "rafsan-ahmed-ayan.firebaseapp.com",
            projectId: "rafsan-ahmed-ayan",
            storageBucket: "rafsan-ahmed-ayan.firebasestorage.app",
            messagingSenderId: "418535718605",
            appId: "1:418535718605:web:62b5c216a2fe191df1b384",
            measurementId: "G-82E7JYPSRQ"
        };

        // Firebase শুরু করা
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // রিক্যাপচা সেটআপ
        window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
            'size': 'normal'
        });

        // ওটিপি পাঠানোর ফাংশন
        document.getElementById('sendCode').onclick = function() {
            const number = document.getElementById('phoneNumber').value;
            const appVerifier = window.recaptchaVerifier;

            signInWithPhoneNumber(auth, number, appVerifier)
                .then((confirmationResult) => {
                    window.confirmationResult = confirmationResult;
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('otp-container').style.display = 'block';
                    alert("OTP sent!");
                }).catch((error) => {
                    alert("Error: " + error.message);
                });
        };

        // ওটিপি যাচাই করার ফাংশন
        document.getElementById('verifyCode').onclick = function() {
            const code = document.getElementById('verificationCode').value;
            confirmationResult.confirm(code).then((result) => {
                alert("Login successful!");
                const user = result.user;
                console.log(user);
            }).catch((error) => {
                alert("Invalid OTP!");
            });
        };
    </script>
</body>
</html>
