<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayan TeraCloud - Ghost Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #ff0000; font-family: 'Courier New', Courier, monospace; }
        .glitch { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; animation: glitch 0.4s infinite; text-align: center; }
        @keyframes glitch { 0% { transform: skew(2deg); text-shadow: 2px 0 #0ff; } 50% { transform: skew(-2deg); text-shadow: -2px 0 #f0f; } 100% { transform: skew(0deg); } }
        .card { background: #0a0a0a; border: 1px solid #300; padding: 15px; border-radius: 8px; transition: 0.3s; cursor: pointer; text-align: center; }
        .card:hover { border-color: #f00; box-shadow: 0 0 15px #f00; }
        input, textarea { background: #111 !important; border: 1px solid #400 !important; color: #fff !important; padding: 10px; width: 100%; border-radius: 5px; margin-bottom: 10px; outline: none; }
        button { background: #600; color: #fff; padding: 10px; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #f00; box-shadow: 0 0 10px #f00; }
        .breadcrumb { color: #888; font-size: 14px; margin-bottom: 20px; cursor: pointer; }
        .breadcrumb span:hover { color: #f00; text-decoration: underline; }
    </style>
</head>
<body class="p-5">

    <div class="max-w-4xl mx-auto">
        <h1 class="glitch mt-5 mb-10">Rafsan Ahmed Ayan</h1>

        <div class="breadcrumb" id="breadcrumb" onclick="goHome()">🏠 Home</div>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-6 mb-10" id="contentDisplay">
            </div>

        <div id="controls" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="card text-left">
                <h3 class="border-b border-red-900 mb-3 pb-1">➕ Create in <span id="currentFolderName">Home</span></h3>
                <input type="text" id="newFolderName" placeholder="Folder Name">
                <button onclick="addNewFolder()">Create Folder</button>
            </div>

            <div class="card text-left">
                <h3 class="border-b border-red-900 mb-3 pb-1">📤 Upload File</h3>
                <input type="file" id="fileInput">
                <button onclick="uploadFile()">Upload to Telegram</button>
            </div>

            <div class="card text-left md:col-span-2">
                <h3 class="border-b border-red-900 mb-3 pb-1">📜 Keep Notes</h3>
                <input type="text" id="noteTitle" placeholder="Title">
                <textarea id="noteContent" rows="2" placeholder="Secret note..."></textarea>
                <button onclick="saveNote()">Save to Cloud</button>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = "8619134830:AAHMs7N2255JPuelNUAXIh5JlnwuPPvfo0c";
        const CHAT_ID = "-1003713977945";

        let currentPath = ["Home"];
        let storage = {
            "Home": ["Rafsan Ahmed Ayan", "Family", "Relatives", "Social Media", "Friends", "Apps"]
        };

        function render() {
            const currentFolder = currentPath[currentPath.length - 1];
            document.getElementById('currentFolderName').innerText = currentFolder;
            document.getElementById('breadcrumb').innerHTML = "🏠 " + currentPath.join(" > ");
            
            const display = document.getElementById('contentDisplay');
            display.innerHTML = "";

            const items = storage[currentFolder] || [];
            items.forEach(item => {
                display.innerHTML += `
                    <div class="card" onclick="openFolder('${item}')">
                        <span class="block text-4xl mb-2">📁</span>
                        <span>${item}</span>
                    </div>`;
            });
        }

        function openFolder(name) {
            currentPath.push(name);
            if (!storage[name]) storage[name] = []; // যদি ফোল্ডারটি নতুন হয়
            render();
        }

        function goHome() {
            currentPath = ["Home"];
            render();
        }

        function addNewFolder() {
            const name = document.getElementById('newFolderName').value;
            if (!name) return alert("নাম দিন!");
            const currentFolder = currentPath[currentPath.length - 1];
            storage[currentFolder].push(name);
            storage[name] = [];
            document.getElementById('newFolderName').value = "";
            render();
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert("ফাইল সিলেক্ট করুন!");
            const currentFolder = currentPath[currentPath.length - 1];
            
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('document', fileInput.files[0]);
            formData.append('caption', `📂 Path: ${currentPath.join("/")}\n📁 Uploaded in: ${currentFolder}`);

            alert("Uploading...");
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: 'POST', body: formData });
            if (res.ok) alert("টেলিগ্রামে আপলোড সফল!");
            else alert("ফেইল্ড!");
        }

        async function saveNote() {
            const title = document.getElementById('noteTitle').value;
            const text = document.getElementById('noteContent').value;
            const currentFolder = currentPath[currentPath.length - 1];
            const message = `📜 *New Note*\n📍 *Folder:* ${currentFolder}\n📌 *Title:* ${title}\n📝 *Content:* ${text}`;
            
            const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(message)}&parse_mode=Markdown`);
            if (res.ok) alert("নোট সেভ হয়েছে!");
            document.getElementById('noteTitle').value = "";
            document.getElementById('noteContent').value = "";
        }

        render(); // শুরুতে লোড করার জন্য
    </script>
</body>
</html>
